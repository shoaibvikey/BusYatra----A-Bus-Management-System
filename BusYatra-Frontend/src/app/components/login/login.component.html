<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg border-0" style="width: 100%; max-width: 450px; border-radius: 15px;">
    
    <div class="card-header text-white text-center py-4" style="background-color: var(--primary-blue); border-radius: 15px 15px 0 0;">
      <h3 class="fw-bold mb-0">{{ isLoginView ? 'Welcome Back' : 'Create Account' }}</h3>
      <p class="small mb-0">{{ isLoginView ? 'Login to manage your bookings' : 'Join Blue & White Travels today' }}</p>
    </div>

    <div class="card-body p-4">
      @if (isLoginView) {
        <form (ngSubmit)="onLogin()">
          <div class="mb-3">
            <label class="form-label fw-bold text-secondary">Email Address</label>
            <input type="email" name="loginEmail" [(ngModel)]="loginObj.email" class="form-control form-control-lg" placeholder="name@example.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold text-secondary">Password</label>
            <input type="password" name="loginPassword" [(ngModel)]="loginObj.password" class="form-control form-control-lg" placeholder="Enter password" required>
          </div>
          
          <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm" style="background-color: var(--primary-blue);" [disabled]="isLoading">
            <span *ngIf="!isLoading">Login</span>
            <span *ngIf="isLoading">
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Logging in...
            </span>
          </button>
        </form>
      }
      @else {
        <form (ngSubmit)="onRegister()">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold text-secondary">First Name</label>
              <input type="text" name="firstName" [(ngModel)]="registerObj.firstName" class="form-control" placeholder="John" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold text-secondary">Last Name</label>
              <input type="text" name="lastName" [(ngModel)]="registerObj.lastName" class="form-control" placeholder="Doe" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold text-secondary">Email</label>
            <input type="email" name="regEmail" [(ngModel)]="registerObj.email" class="form-control" placeholder="email@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold text-secondary">Contact No</label>
            <input type="text" name="contactNo" [(ngModel)]="registerObj.contactNo" class="form-control" placeholder="10-digit number" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold text-secondary">Password</label>
            <input type="password" name="regPassword" [(ngModel)]="registerObj.password" class="form-control" placeholder="Create password" required>
          </div>
          
          <button type="submit" class="btn btn-success w-100 btn-lg shadow-sm" [disabled]="isLoading">
            <span *ngIf="!isLoading">Register</span>
            <span *ngIf="isLoading">
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Registering...
            </span>
          </button>
        </form>
      }

      <div class="text-center mt-4">
        <p class="text-muted">
          {{ isLoginView ? "Don't have an account?" : "Already have an account?" }}
          <a href="javascript:void(0)" (click)="toggleView()" class="fw-bold text-decoration-none" style="color: var(--primary-blue);">
            {{ isLoginView ? 'Sign Up' : 'Login Here' }}
          </a>
        </p>
      </div>
    </div>

  </div>
</div>

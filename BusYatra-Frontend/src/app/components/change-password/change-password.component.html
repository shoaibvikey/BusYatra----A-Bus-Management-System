<div class="card shadow-sm border-0 p-4">
  <h4 class="fw-bold mb-4">Change Password</h4>
  
  <form #pwdForm="ngForm" (ngSubmit)="onChangePassword(pwdForm)" novalidate>
    
    <div class="mb-3">
      <label class="small text-muted">Current Password</label>
      <input type="password" class="form-control" [(ngModel)]="passwords.current" name="current" #current="ngModel" [ngClass]="{'is-invalid': current.invalid && current.touched}" required>
      <div *ngIf="current.invalid && current.touched" class="invalid-feedback small">
        Please enter your current password.
      </div>
    </div>
    
    <div class="mb-3">
      <label class="small text-muted">New Password</label>
      <input type="password" class="form-control" [(ngModel)]="passwords.new" name="newPwd" #newPwd="ngModel" [ngClass]="{'is-invalid': newPwd.invalid && newPwd.touched}" required minlength="6">
      <div *ngIf="newPwd.invalid && newPwd.touched" class="invalid-feedback small">
        <span *ngIf="newPwd.errors?.['required']">A new password is required.</span>
        <span *ngIf="newPwd.errors?.['minlength']">Must be at least 6 characters.</span>
      </div>
    </div>
    
    <div class="mb-4">
      <label class="small text-muted">Confirm New Password</label>
      <input type="password" class="form-control" [(ngModel)]="passwords.confirm" name="confirm" #confirm="ngModel" [ngClass]="{'is-invalid': confirm.invalid && confirm.touched}" required minlength="6">
      <div *ngIf="confirm.invalid && confirm.touched" class="invalid-feedback small">
        <span *ngIf="confirm.errors?.['required']">Please confirm your new password.</span>
        <span *ngIf="confirm.errors?.['minlength']">Must be at least 6 characters.</span>
      </div>
    </div>
    
    <button type="submit" class="btn btn-primary fw-bold px-4" [disabled]="isLoading">
      <span *ngIf="!isLoading">Update Password</span>
      <span *ngIf="isLoading">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        Updating...
      </span>
    </button>
    
  </form>
</div>

<div class="card bg-primary text-white shadow-sm border-0 p-5 mb-4 text-center rounded-3">
  <p class="text-uppercase small mb-2 opacity-75 fw-bold">Current Wallet Balance</p>
  <h1 class="display-3 fw-bold mb-0">₹{{ user.walletBalance || 0 }}</h1>
</div>

<div class="card shadow-sm border-0 p-4">
  <h5 class="fw-bold mb-3">Add Money to Wallet</h5>
  
  <form #walletForm="ngForm" (ngSubmit)="addMoney(walletForm)" novalidate>
    
    <div class="input-group input-group-lg mb-1">
      <span class="input-group-text bg-light border-end-0">₹</span>
      
      <input type="number" 
             class="form-control border-start-0" 
             name="amount" 
             [(ngModel)]="addAmount" 
             #amount="ngModel" 
             placeholder="Enter amount" 
             [ngClass]="{'is-invalid': amount.invalid && amount.touched}" 
             required 
             min="1" 
             [disabled]="isLoading">
      
      <button type="submit" class="btn btn-success fw-bold px-4" [disabled]="isLoading">
        <span *ngIf="!isLoading">Add Funds</span>
        <span *ngIf="isLoading">
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          Processing...
        </span>
      </button>
    </div>
    
    <div *ngIf="amount.invalid && amount.touched" class="text-danger small mt-1 ms-5">
      <span *ngIf="amount.errors?.['required']">Please enter an amount to add.</span>
      <span *ngIf="amount.errors?.['min']">Amount must be greater than ₹0.</span>
    </div>
    
  </form>
</div>

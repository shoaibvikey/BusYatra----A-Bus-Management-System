# Application Name and Port
spring.application.name=BusReservationSystem
server.port=8080

# MySQL Database Connection
# The '?createDatabaseIfNotExist=true' part tells MySQL to create the 'bus_db' database for you automatically!
spring.datasource.url=jdbc:mysql://localhost:3306/bus_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration (The MVC Model layer)
# 'update' tells Hibernate to automatically create or update your database tables based on your Java Entities
spring.jpa.hibernate.ddl-auto=update

# Show SQL in the console (Great for debugging and learning!)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
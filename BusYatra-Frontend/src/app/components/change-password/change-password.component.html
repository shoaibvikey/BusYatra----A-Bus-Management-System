<div class="card shadow-sm border-0 p-4">
  <h4 class="fw-bold mb-4">Change Password</h4>
  <form (ngSubmit)="onChangePassword()">
    <div class="mb-3">
      <label class="small text-muted">Current Password</label>
      <input type="password" class="form-control" [(ngModel)]="passwords.current" name="current" required>
    </div>
    <div class="mb-3">
      <label class="small text-muted">New Password</label>
      <input type="password" class="form-control" [(ngModel)]="passwords.new" name="newPwd" required>
    </div>
    <div class="mb-4">
      <label class="small text-muted">Confirm New Password</label>
      <input type="password" class="form-control" [(ngModel)]="passwords.confirm" name="confirm" required>
    </div>
    <button type="submit" class="btn btn-primary fw-bold px-4">Update Password</button>
  </form>
</div>

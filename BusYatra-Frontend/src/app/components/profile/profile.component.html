<div class="card shadow-sm border-0 p-4">
  <h4 class="fw-bold mb-4">My Profile</h4>
  <form (ngSubmit)="onUpdate()">
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <label class="small text-muted">First Name</label>
        <input type="text" class="form-control bg-light" [value]="user.firstName" readonly>
      </div>
      <div class="col-md-6">
        <label class="small text-muted">Last Name</label>
        <input type="text" class="form-control bg-light" [value]="user.lastName" readonly>
      </div>
    </div>
    <div class="mb-3">
      <label class="small text-muted">Email</label>
      <input type="email" class="form-control bg-light" [value]="user.email" readonly>
    </div>
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <label class="small text-muted">Gender</label>
        <select class="form-select" [(ngModel)]="user.gender" name="gender">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="small text-muted">Date of Birth</label>
        <input type="date" class="form-control" [(ngModel)]="user.dob" name="dob">
      </div>
    </div>
    <div class="mb-3">
      <label class="small text-muted">Contact Number</label>
      <input type="text" class="form-control" [(ngModel)]="user.contactNo" name="contactNo">
    </div>
    <div class="mb-4">
      <label class="small text-muted">Address</label>
      <textarea class="form-control" [(ngModel)]="user.address" name="address" rows="3"></textarea>
    </div>

    <button type="submit" class="btn btn-primary fw-bold px-4" [disabled]="isLoading">
      <span *ngIf="!isLoading">Save Changes</span>
      <span *ngIf="isLoading">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        Saving...
      </span>
    </button>
  </form>
</div>

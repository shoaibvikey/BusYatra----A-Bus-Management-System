<div class="card bg-primary text-white shadow-sm border-0 p-5 mb-4 text-center rounded-3">
  <p class="text-uppercase small mb-2 opacity-75 fw-bold">Current Wallet Balance</p>
  <h1 class="display-3 fw-bold mb-0">₹{{ user.walletBalance || 0 }}</h1>
</div>

<div class="card shadow-sm border-0 p-4">
  <h5 class="fw-bold mb-3">Add Money to Wallet</h5>
  <div class="input-group input-group-lg">
    <span class="input-group-text bg-light border-end-0">₹</span>
    <input type="number" class="form-control border-start-0" #amountInput placeholder="Enter amount" [disabled]="isLoading">
    
    <button class="btn btn-success fw-bold px-4" (click)="addMoney(amountInput)" [disabled]="isLoading">
      <span *ngIf="!isLoading">Add Funds</span>
      <span *ngIf="isLoading">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        Processing...
      </span>
    </button>
  </div>
</div>
